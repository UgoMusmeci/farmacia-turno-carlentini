name: Aggiorna farmacia turno

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui scraper
        run: python scripts/scrape.py

      - name: Commit e push JSON aggiornato
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/farmacia.json

          git diff --quiet && git diff --staged --quiet || git commit -m "Aggiornamento farmacia"

          git push