<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Farmacia di Turno - Carlentini</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      background: #f3f5f7;
      font-family: Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 760px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .badge {
      color: #0073aa;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 32px;
      line-height: 1.1;
      color: #222;
    }

    .indirizzo {
      font-size: 17px;
      line-height: 1.4;
      margin-bottom: 12px;
      color: #444;
    }

    .telefono {
      margin-bottom: 18px;
      font-size: 16px;
    }

    .telefono a {
      color: #0073aa;
      text-decoration: none;
      font-weight: bold;
    }

    .button {
      display: block;
      width: 100%;
      background: #0073aa;
      color: white;
      text-decoration: none;
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 18px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 0;
      border-radius: 16px;
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .error {
      color: #a00;
      text-align: center;
    }

    @media (min-width: 768px) {

      body {
        padding: 24px;
      }

      .card {
        padding: 28px;
      }

      h1 {
        font-size: 40px;
      }

      iframe {
        height: 420px;
      }

      .button {
        display: inline-block;
        width: auto;
        padding: 14px 24px;
      }

    }

  </style>

</head>

<body>

<div id="app">

  <div class="card">
    Caricamento farmacia di turno...
  </div>

</div>

<script>

async function caricaFarmacia() {

  try {

    const response = await fetch('./data/farmacia.json?v=' + Date.now());

    const data = await response.json();

    if (!data.success) {
      throw new Error("JSON non valido");
    }

    const farmacia = data.farmacia;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

    let mapsUrl = "";

    if (isIOS) {

      mapsUrl = `https://maps.apple.com/?daddr=${farmacia.lat},${farmacia.lng}`;

    } else {

      mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${farmacia.lat},${farmacia.lng}`;

    }

    document.getElementById('app').innerHTML = `

      <div class="card">

        <div class="badge">
          Farmacia di turno
        </div>

        <h1>${farmacia.nome}</h1>

        <div class="indirizzo">
          📍 ${farmacia.indirizzo}
        </div>

        <div class="telefono">
          ☎️
          <a href="tel:${farmacia.telefono}">
            ${farmacia.telefono}
          </a>
        </div>

        <a
          class="button"
          href="${mapsUrl}"
          target="_blank">

          APRI NAVIGAZIONE

        </a>

        <iframe
          loading="lazy"
          allowfullscreen
          src="https://www.google.com/maps?q=${farmacia.lat},${farmacia.lng}&output=embed">
        </iframe>

        <div class="footer">
          Aggiornato: ${data.last_update}
        </div>

      </div>

    `;

  } catch(error) {

    document.getElementById('app').innerHTML = `

      <div class="card">

        <h2 class="error">
          Servizio momentaneamente non disponibile
        </h2>

      </div>

    `;

    console.error(error);

  }

}

caricaFarmacia();

</script>

</body>
</html>
